<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Card -->
  <rect width="400" height="400" rx="80" fill="#f5f0ff"/>
  <rect width="400" height="400" rx="80" fill="none" stroke="#7c3aed" stroke-width="6"/>

  <!-- Inner blobs -->
  <circle cx="100" cy="100" r="130" fill="#7c3aed" opacity="0.07"/>
  <circle cx="320" cy="330" r="150" fill="#06d6a0" opacity="0.07"/>
  <circle cx="330" cy="90"  r="110" fill="#f9c74f" opacity="0.07"/>

  <!-- ? thick arc -->
  <path d="M148,158 C148,110 166,92 200,92 C234,92 254,110 254,136 C254,166 234,180 218,197 C206,210 202,222 202,242"
        fill="none" stroke="#7c3aed" stroke-width="30" stroke-linecap="round"/>
  <!-- ? inner cutout -->
  <path d="M162,158 C162,118 178,106 200,106 C222,106 240,118 240,136 C240,162 222,175 207,191 C197,202 212,222 212,242"
        fill="none" stroke="#f5f0ff" stroke-width="14" stroke-linecap="round"/>

  <!-- Dot -->
  <circle cx="200" cy="288" r="28" fill="#7c3aed"/>
  <!-- Bell curve inside dot -->
  <path d="M184,295 C186,295 188,293 191,287 C193,283 196,280 198,280 C199,280 200,280 202,281 C205,284 207,288 210,295 C213,295 215,294 216,292"
